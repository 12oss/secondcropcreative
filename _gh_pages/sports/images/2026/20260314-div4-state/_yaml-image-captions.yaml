gallery-images:
  - filename: 20260314-albany-monticello-state-championship-002.jpg
    caption: "Albany/Monticello falls in a 43-40 thriller to Neillsville in the WIAA Division 4 State Championship at the Resch Center. After being moved up to Division 4 this season through the WIAA’s rebalancing efforts, the Space Stallions successfully navigated the higher division to return to the state stage. Despite a fierce late-game rally, A-M finishes the season as state runners-up with a 27-3 record."
